<!DOCTYPE html>
<html>
<head>
  <title>Camera</title>
</head>
<body>

<h2>Open Camera</h2>
<video id="video" width="300" autoplay></video>

<script>
async function startCamera() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ video: true });
    document.getElementById('video').srcObject = stream;
  } catch (err) {
    alert("Camera error!");
  }
}

startCamera();
</script>

</body>
</html>
